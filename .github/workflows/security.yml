name: Security

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Weekly sweep so advisories published between pushes still surface.
    - cron: '17 3 * * 1'

jobs:
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        # Full history: leaked credentials in old commits are still live
        # credentials until rotated.
        fetch-depth: 0

    - name: Run gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install production requirements
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt pip-audit

    - name: Run pip-audit
      run: |
        cd backend
        pip-audit

  npm-audit:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Audit production dependencies
      run: |
        cd frontend
        npm audit --omit=dev --audit-level=high
