version: "3.9"

# Production docker-compose — use with:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required env file: ./backend/.env (copy from .env.example and fill in)
# Required env file: ./frontend/.env.production

services:

  # ── Nginx reverse proxy + TLS termination ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # ── Django ASGI (daphne — HTTP + WebSockets) ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    command: >
      daphne -b 0.0.0.0 -p 8000
             --access-log -
             --proxy-headers
             config.asgi:application
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      RUN_STARTUP_MIGRATIONS: "true"
      WEB_WORKERS: "5"
    volumes:
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Celery default queue worker ────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    command: >
      celery -A config.celery:app worker
             --loglevel=info
             --queues=default
             --concurrency=4
             --max-tasks-per-child=100
             --without-gossip
             --without-mingle
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── Celery AI queue worker (isolated — AI tasks don't block other tasks) ───
  worker-ai:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    command: >
      celery -A config.celery:app worker
             --loglevel=info
             --queues=ai
             --concurrency=2
             --max-tasks-per-child=50
             --without-gossip
             --without-mingle
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── Celery Beat scheduler ──────────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    command: >
      celery -A config.celery:app beat
             --loglevel=info
             --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── Next.js frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: ./frontend/.env.production
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── PostgreSQL with pgvector ───────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg15
    env_file: ./backend/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-elearning}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./nginx/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=4MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (persistence + AOF) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
        --appendonly yes
        --appendfsync everysec
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  static_files:
