[phases.setup]
aptPkgs = ["...", "build-essential", "libcairo2-dev", "pkg-config", "python3-dev", "python3-pip", "python3-venv"]

[variables]
C_INCLUDE_PATH = "/usr/include"
CPLUS_INCLUDE_PATH = "/usr/include"

[phases.install]
cmds = ["python3 -m venv --copies /opt/venv && /opt/venv/bin/pip install setuptools && /opt/venv/bin/pip install -r requirements.txt"]

[start]
cmd = "cd backend && /opt/venv/bin/python manage.py migrate_schemas --shared --noinput && /opt/venv/bin/python manage.py migrate_schemas --schema=public --noinput && /opt/venv/bin/python manage.py migrate_schemas --tenant --noinput && /opt/venv/bin/python manage.py init_prod && /opt/venv/bin/gunicorn config.wsgi --bind 0.0.0.0:$PORT"
